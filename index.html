<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filipino Recipe Finder</title>
</head>
<body>
    <h1>Welcome to the Filipino Recipe Finder</h1>
    <p>Search for your favorite Filipino recipes.</p>
    <input type="text" id="search" placeholder="Enter recipe name">
    <button id="search-btn">Search</button>
    <div id="results"></div>

    <script>
        document.getElementById('search-btn').addEventListener('click', function() {
            const query = document.getElementById('search').value;
            fetch(`https://api.example.com/recipes?search=${query}`)
                .then(response => response.json())
                .then(data => {
                    const resultsDiv = document.getElementById('results');
                    resultsDiv.innerHTML = '';
                    data.recipes.forEach(recipe => {
                        const recipeDiv = document.createElement('div');
                        recipeDiv.innerHTML = `<h2>${recipe.title}</h2><p>${recipe.description}</p>`;
                        resultsDiv.appendChild(recipeDiv);
                    });
                });
        });
    </script>
</body>
</html>
